version: '3.8'

services:
  # PostgreSQL Database
  postgresql:
    build: ./postgresql
    container_name: medico-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: medico_db
      POSTGRES_USER: medico_user
      POSTGRES_PASSWORD: medico_password
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - medico-network

  # Keycloak Authentication Server
  keycloak:
    build: ./keycloak
    container_name: medico-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgresql:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HTTP_PORT: 8080
      KC_HTTPS_PORT: 8443
    ports:
      - "8080:8080"
    depends_on:
      - postgresql
    networks:
      - medico-network

  # Quarkus Backend
  backend:
    build: ./backend
    container_name: medico-backend
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/medico_db
      QUARKUS_DATASOURCE_USERNAME: medico_user
      QUARKUS_DATASOURCE_PASSWORD: medico_password
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/medico
      QUARKUS_OIDC_CLIENT_ID: medico-backend
      QUARKUS_OIDC_CREDENTIALS_SECRET: secret
      QUARKUS_HTTP_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8081:8080"
    depends_on:
      - postgresql
      - keycloak
    networks:
      - medico-network

  # React Frontend
  frontend:
    build: ./frontend
    container_name: medico-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8081
      REACT_APP_KEYCLOAK_URL: http://localhost:8080
      REACT_APP_KEYCLOAK_REALM: medico
      REACT_APP_KEYCLOAK_CLIENT_ID: medico-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - keycloak
    networks:
      - medico-network

volumes:
  postgresql_data:
    driver: local

networks:
  medico-network:
    driver: bridge