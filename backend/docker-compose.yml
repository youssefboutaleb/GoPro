## version removed (obsolete)
services:
  quarkus:
    build: .
    image: gopro-backend:latest
    container_name: quarkus
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/medico
      - QUARKUS_DATASOURCE_USERNAME=medico
      - QUARKUS_DATASOURCE_PASSWORD=medico
      - QUARKUS_KEYCLOAK_URL=http://keycloak:8080
    depends_on:
      - postgres
      - keycloak

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: medico
      POSTGRES_USER: medico
      POSTGRES_PASSWORD: medico
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: medico
      KC_DB_USERNAME: medico
      KC_DB_PASSWORD: medico
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/medico-realm.json
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    command: start-dev
    volumes:
      - ../keycloak/medico-realm.json:/opt/keycloak/data/import/medico-realm.json
