# Server configuration
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant
quarkus.http.cors.exposed-headers=Authorization

# Database configuration
# Note: In Docker, use container name 'postgresql'. For local development, use 'localhost'
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://postgresql:5432/medico_db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:medico_user}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:medico_password}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# Hibernate ORM
# Changed from 'validate' to 'update' to allow backend to start with schema differences
# TODO: Fix database schema to match entities, then change back to 'validate'
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0
quarkus.flyway.locations=db/migration

# Keycloak/OIDC Configuration
# Note: In Docker, use container name 'keycloak'. For local development, use 'localhost'
# This will be overridden by environment variable QUARKUS_OIDC_AUTH_SERVER_URL in docker-compose
quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:http://keycloak:8080/realms/medico}
quarkus.oidc.client-id=medico-backend
quarkus.oidc.credentials.secret=secret
quarkus.oidc.application-type=service
quarkus.oidc.tls.verification=none
# Disable discovery to avoid startup connection issues - we'll configure manually
quarkus.oidc.discovery-enabled=false
# Configure JWKS endpoint manually
quarkus.oidc.jwks-path=/protocol/openid-connect/certs

# Security
# Exclude health endpoints from authentication
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public.paths=/health,/health/*
quarkus.http.auth.permission.public.policy=permit

# OpenAPI/Swagger
quarkus.smallrye-openapi.info-title=Medico KPI API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Medical KPI Metrics API with Keycloak authentication
quarkus.smallrye-openapi.security-scheme-name=SecurityScheme
quarkus.smallrye-openapi.security-scheme-description=Authentication using Keycloak

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.medico".level=DEBUG