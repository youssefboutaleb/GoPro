# Test profile overrides for local unit tests
# Use in-memory H2 to avoid needing Postgres during unit tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable Flyway during unit tests (we use Hibernate to create schema)
quarkus.flyway.migrate-at-start=false

# Disable OIDC during unit tests to avoid external Keycloak calls
quarkus.oidc.enabled=false

# Ensure application endpoints used in unit tests are not globally protected
# Move authenticated requirement to a narrower path so /health is accessible
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Make tests quieter
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] (%t) %s%n
