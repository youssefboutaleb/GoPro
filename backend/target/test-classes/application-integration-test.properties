# Integration test profile - uses real Postgres and Keycloak via Testcontainers
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.driver=org.postgresql.Driver

# Let Flyway run migrations at startup (against Testcontainers Postgres)
quarkus.flyway.migrate-at-start=true

# Enable OIDC (will be configured by Testcontainers)
quarkus.oidc.enabled=true

# Make tests quieter but show container startup
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] (%t) %s%n